# Docker Compose file format version (NOT Python version!)
# Python version is defined in Dockerfile: FROM python:3.12-slim
version: '3.8'

# Development docker-compose with hot reload
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: medical-assistant-backend-dev
    restart: unless-stopped
    ports:
      - "8009:8009"
    environment:
      - DATABASE_URL=sqlite:///./medical_assistant.db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - GROQ_API_KEY=${GROQ_API_KEY:-your-groq-api-key-here}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-your-tavily-api-key-here}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-your-google-api-key-here}
      - UPLOAD_DIR=uploads
      - CHROMA_DB_DIR=chroma_db
      - ANONYMIZED_TELEMETRY=False
      - DEBUG=True
    volumes:
      # Mount source code for hot reload
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/medical_assistant.db:/app/medical_assistant.db
    networks:
      - medical-assistant-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8009 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: medical-assistant-frontend-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      # Mount source code for hot reload
      - ./frontend:/app
      - /app/node_modules
    networks:
      - medical-assistant-network
    environment:
      - VITE_API_BASE_URL=http://localhost:8009

networks:
  medical-assistant-network:
    driver: bridge
